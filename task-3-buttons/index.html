<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тестовое задание — Кнопки</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="page-container">
        <a href="../" class="back-link">← На главную</a>
      </div>
    </header>

    <main class="page-container">
      <div class="matrix-grid">
        <!-- Колонка 1 -->
        <div class="matrix-col">
          <button type="button" class="btn btn-secondary">Просмотреть</button>
          <button type="button" class="btn btn-secondary is-hover">
            Просмотреть
          </button>
          <button type="button" class="btn btn-secondary is-active">
            Просмотреть
          </button>
          <button type="button" class="btn btn-secondary" disabled>
            Просмотреть
          </button>
        </div>

        <!-- Колонка 2 -->
        <div class="matrix-col">
          <button type="button" class="btn btn-outline-danger">
            Просмотреть
          </button>
          <button type="button" class="btn btn-outline-danger is-hover">
            Просмотреть
          </button>
          <button type="button" class="btn btn-outline-danger is-active">
            Просмотреть
          </button>
          <button type="button" class="btn btn-outline-danger" disabled>
            Просмотреть
          </button>
        </div>

        <!-- Колонка 3 -->
        <div class="matrix-col">
          <button type="button" class="btn btn-danger">Просмотреть</button>
          <button type="button" class="btn btn-danger is-hover">
            Просмотреть
          </button>
          <button type="button" class="btn btn-danger is-active">
            Просмотреть
          </button>
          <button type="button" class="btn btn-danger" disabled>
            Просмотреть
          </button>
        </div>

        <!-- Колонка 4 (Автоматическая стрелочка через псевдоэлемент CSS) -->
        <div class="matrix-col">
          <button type="button" class="btn btn-secondary" data-icon="arrow">
            <span>Просмотреть</span>
          </button>
          <button
            type="button"
            class="btn btn-secondary is-hover"
            data-icon="arrow"
          >
            <span>Просмотреть</span>
          </button>
          <button
            type="button"
            class="btn btn-secondary is-active"
            data-icon="arrow"
          >
            <span>Просмотреть</span>
          </button>
          <button
            type="button"
            class="btn btn-secondary"
            disabled
            data-icon="arrow"
          >
            <span>Просмотреть</span>
          </button>
        </div>

        <!-- Колонка 5 -->
        <div class="matrix-col">
          <button type="button" class="btn btn-primary">Просмотреть</button>
          <button type="button" class="btn btn-primary is-hover">
            Просмотреть
          </button>
          <button type="button" class="btn btn-primary is-active">
            Просмотреть
          </button>
          <button type="button" class="btn btn-primary" disabled>
            Просмотреть
          </button>
        </div>

        <!-- Колонка 6 -->
        <div class="matrix-col">
          <button type="button" class="btn btn-outline-primary">
            Просмотреть
          </button>
          <button type="button" class="btn btn-outline-primary is-hover">
            Просмотреть
          </button>
          <button type="button" class="btn btn-outline-primary is-active">
            Просмотреть
          </button>
          <button type="button" class="btn btn-outline-primary" disabled>
            Просмотреть
          </button>
        </div>
      </div>

      <!-- Нижний ряд с обычными контентными иконками -->
      <div class="bottom-row">
        <button type="button" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
            />
          </svg>
          <span>Редактировать</span>
        </button>
        <button type="button" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M5 4v16h14V8l-4-4H5zm7 11H7v-2h5v2zm3-4H7V9h8v2zm0-4H7V5h8v2z"
            />
          </svg>
          <span>Выгрузить в Excel</span>
        </button>
        <button type="button" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
            />
          </svg>
          <span>Удалить список</span>
        </button>
        <button type="button" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"
            />
          </svg>
          <span>Распечатать</span>
        </button>
        <button type="button" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"
            />
          </svg>
          <span>Загрузить из файла</span>
        </button>
      </div>
    </main>
  </body>
  <!-- TODO заменить захардкоженные иконки на файлы -->
</html>
